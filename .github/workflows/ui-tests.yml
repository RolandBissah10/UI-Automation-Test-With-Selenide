name: Selenide UI Tests — Swag Labs

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main"]
  workflow_dispatch:
    inputs:
      suite:
        description: "Test suite to run"
        required: true
        default: "all"
        type: choice
        options: [ all, smoke, regression ]
      browser:
        description: "Browser"
        required: true
        default: "chrome"
        type: choice
        options: [ chrome, firefox ]

env:
  JAVA_VERSION: "17"
  MAVEN_OPTS: "-Xmx2g"

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - uses: browser-actions/setup-chrome@v1

      - name: Run smoke tests
        run: |
          mvn test -Psmoke \
            -Dbrowser=chrome \
            -Dheadless=true \
            -e -fae -B --no-transfer-progress

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-smoke
          path: target/surefire-reports

  regression-tests:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || inputs.suite != 'smoke'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - uses: browser-actions/setup-chrome@v1

      - name: Run regression tests
        run: |
          mvn test -Pregression \
            -Dbrowser=${{ github.event.inputs.browser || 'chrome' }} \
            -Dheadless=true \
            -e -fae -B --no-transfer-progress

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-regression
          path: target/surefire-reports

  # 🔥 FIXED PARSE RESULTS
  parse-results:
    runs-on: ubuntu-latest
    needs: [ smoke-tests, regression-tests ]
    if: always()

    outputs:
      tests_total:   ${{ steps.parse.outputs.tests_total }}
      tests_passed:  ${{ steps.parse.outputs.tests_passed }}
      tests_failed:  ${{ steps.parse.outputs.tests_failed }}
      tests_skipped: ${{ steps.parse.outputs.tests_skipped }}
      failed_tests:  ${{ steps.parse.outputs.failed_tests }}
      status:        ${{ steps.parse.outputs.status }}

    steps:
      - name: Download smoke reports
        uses: actions/download-artifact@v4
        with:
          name: surefire-reports-smoke
          path: reports
        continue-on-error: true

      - name: Download regression reports
        uses: actions/download-artifact@v4
        with:
          name: surefire-reports-regression
          path: reports
        continue-on-error: true

      - name: Parse results
        id: parse
        run: |
          TOTAL=0; FAILED=0; SKIPPED=0
          FAILED_TESTS_FILE="failed_tests.txt"
          > $FAILED_TESTS_FILE

          for xml in reports/TEST-*.xml; do
            [ -f "$xml" ] || continue

            t=$(grep -oP 'tests="\K[0-9]+' "$xml" | head -1 || echo 0)
            f=$(grep -oP 'failures="\K[0-9]+' "$xml" | head -1 || echo 0)
            e=$(grep -oP 'errors="\K[0-9]+' "$xml" | head -1 || echo 0)
            s=$(grep -oP 'skipped="\K[0-9]+' "$xml" | head -1 || echo 0)

            TOTAL=$((TOTAL + t))
            FAILED=$((FAILED + f + e))
            SKIPPED=$((SKIPPED + s))

            # ✅ Extract ONLY failed tests with reason
            awk '
              /<testcase / {
                match($0, /classname="([^"]+)"/, c)
                match($0, /name="([^"]+)"/, n)
                classname=c[1]; name=n[1]
              }

              /<failure|<error/ {
                message="No message"
                if (match($0, /message="([^"]+)"/, m)) {
                  message=m[1]
                }
                printf "• %s.%s\n  Reason: %s\n\n", classname, name, message
              }
            ' "$xml" >> $FAILED_TESTS_FILE

          done

          PASSED=$((TOTAL - FAILED - SKIPPED))

          echo "tests_total=$TOTAL"     >> $GITHUB_OUTPUT
          echo "tests_passed=$PASSED"   >> $GITHUB_OUTPUT
          echo "tests_failed=$FAILED"   >> $GITHUB_OUTPUT
          echo "tests_skipped=$SKIPPED" >> $GITHUB_OUTPUT

          # ✅ Multiline output FIX
          echo "failed_tests<<EOF" >> $GITHUB_OUTPUT
          cat $FAILED_TESTS_FILE >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # ✅ Status for Slack
          if [ "$FAILED" -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

          # 🔍 Debug
          echo "========= FAILED TESTS ========="
          cat $FAILED_TESTS_FILE
          echo "================================"

  # 🔔 SLACK
  notify-slack:
    needs: parse-results
    if: always()
    uses: ./.github/workflows/slack-notification.yml
    secrets: inherit
    with:
      status:        ${{ needs.parse-results.outputs.status }}
      tests_total:   ${{ needs.parse-results.outputs.tests_total }}
      tests_passed:  ${{ needs.parse-results.outputs.tests_passed }}
      tests_failed:  ${{ needs.parse-results.outputs.tests_failed }}
      tests_skipped: ${{ needs.parse-results.outputs.tests_skipped }}
      failed_tests:  ${{ needs.parse-results.outputs.failed_tests }}