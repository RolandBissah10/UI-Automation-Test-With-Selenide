name: Selenide UI Tests — Swag Labs

on:
  push:
    branches: [ "main", "develop", "feature/**" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:
    inputs:
      suite:
        description: "Test suite to run"
        required: true
        default: "all"
        type: choice
        options: [ all, smoke, regression ]
      browser:
        description: "Browser"
        required: true
        default: "chrome"
        type: choice
        options: [ chrome, firefox ]

env:
  JAVA_VERSION: "17"
  MAVEN_OPTS: "-Xmx2g"

jobs:
  # ── Smoke tests
  smoke-tests:
    name: "Smoke Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - uses: browser-actions/setup-chrome@v1
      - name: Run smoke tests
        run: |
          mvn test -Psmoke \
            -Dbrowser=chrome \
            -Dheadless=true \
            -e -fae -B --no-transfer-progress
      - name: Upload surefire reports (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-smoke
          path: target/surefire-reports
          retention-days: 7
      - name: Upload Allure results (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-smoke
          path: target/allure-results
          retention-days: 7
      - name: Upload screenshots (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-smoke
          path: target/selenide-screenshots
          retention-days: 7

  # ── Regression tests
  regression-tests:
    name: "Regression Tests"
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || inputs.suite != 'smoke'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - uses: browser-actions/setup-chrome@v1
      - name: Run regression tests
        run: |
          mvn test -Pregression \
            -Dbrowser=${{ github.event.inputs.browser || 'chrome' }} \
            -Dheadless=true -e -fae -B --no-transfer-progress
      - name: Upload surefire reports (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-regression
          path: target/surefire-reports
          retention-days: 14
      - name: Upload Allure results (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-regression
          path: target/allure-results
          retention-days: 14
      - name: Upload screenshots (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-regression
          path: target/selenide-screenshots
          retention-days: 14

  # ── Allure report generation
  generate-report:
    name: "Generate Allure Report"
    runs-on: ubuntu-latest
    needs: [ smoke-tests, regression-tests ]
    if: always()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download smoke results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-smoke
          path: target/allure-results
        continue-on-error: true
      - name: Download regression results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-regression
          path: target/allure-results
        continue-on-error: true
      - name: Generate Allure report
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -zxf allure-2.27.0.tgz
          ./allure-2.27.0/bin/allure generate target/allure-results --clean -o target/allure-report
      - name: Upload Allure report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/allure-report
          retention-days: 30
      - name: Publish Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: target/allure-report

  # ── Slack notification
  notify-slack:
    name: "Notify Slack"
    runs-on: ubuntu-latest
    needs: [ generate-report ]
    if: always()
    uses: ./.github/workflows/slack-notification.yml
    secrets: inherit
    with:
      status: ${{ needs.test.result }}
      tests_total: ${{ needs.test.outputs.tests_total }}
      tests_passed: ${{ needs.test.outputs.tests_passed }}
      tests_failed: ${{ needs.test.outputs.tests_failed }}
      tests_skipped: ${{ needs.test.outputs.tests_skipped }}
      passed_tests: ${{ needs.test.outputs.passed_tests }}
      failed_tests: ${{ needs.test.outputs.failed_tests }}

  # ── Email notification
  notify-email:
    name: "Notify via Email"
    runs-on: ubuntu-latest
    needs: [ generate-report ]
    if: always()
    uses: ./.github/workflows/email-notification.yml
    secrets: inherit
    with:
      status: ${{ needs.test.result }}
      tests_total: ${{ needs.test.outputs.tests_total }}
      tests_passed: ${{ needs.test.outputs.tests_passed }}
      tests_failed: ${{ needs.test.outputs.tests_failed }}
      tests_skipped: ${{ needs.test.outputs.tests_skipped }}
      passed_tests: ${{ needs.test.outputs.passed_tests }}
      failed_tests: ${{ needs.test.outputs.failed_tests }}