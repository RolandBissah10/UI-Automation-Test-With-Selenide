name: Selenide UI Tests — Swag Labs

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main"]
  workflow_dispatch:
    inputs:
      suite:
        description: "Test suite to run"
        required: true
        default: "all"
        type: choice
        options: [ all, smoke, regression ]
      browser:
        description: "Browser"
        required: true
        default: "chrome"
        type: choice
        options: [ chrome, firefox ]

env:
  JAVA_VERSION: "17"
  MAVEN_OPTS: "-Xmx2g"

jobs:
  # ── Smoke tests ──────────────────────────────────────────
  smoke-tests:
    name: "Smoke Tests"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - uses: browser-actions/setup-chrome@v1

      - name: Run smoke tests
        run: |
          mvn test -Psmoke \
            -Dbrowser=chrome \
            -Dheadless=true \
            -e -fae -B --no-transfer-progress

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-smoke
          path: target/surefire-reports

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-smoke
          path: target/allure-results

  # ── Regression tests ─────────────────────────────────────
  regression-tests:
    name: "Regression Tests"
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || inputs.suite != 'smoke'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - uses: browser-actions/setup-chrome@v1

      - name: Run regression tests
        run: |
          mvn test -Pregression \
            -Dbrowser=${{ github.event.inputs.browser || 'chrome' }} \
            -Dheadless=true \
            -e -fae -B --no-transfer-progress

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-regression
          path: target/surefire-reports

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-regression
          path: target/allure-results

  parse-results:
    name: Parse Test Results
    runs-on: ubuntu-latest
    needs: [ smoke-tests, regression-tests ]
    if: always()

    outputs:
      tests_total:   ${{ steps.parse.outputs.tests_total }}
      tests_passed:  ${{ steps.parse.outputs.tests_passed }}
      tests_failed:  ${{ steps.parse.outputs.tests_failed }}
      tests_skipped: ${{ steps.parse.outputs.tests_skipped }}

    steps:
      - name: Download smoke reports
        uses: actions/download-artifact@v4
        with:
          name: surefire-reports-smoke
          path: reports
        continue-on-error: true

      - name: Download regression reports
        uses: actions/download-artifact@v4
        with:
          name: surefire-reports-regression
          path: reports
        continue-on-error: true

      - name: Parse results
        id: parse
        run: |
          TOTAL=0; FAILED=0; SKIPPED=0
          FAILED_TESTS=""

          for xml in reports/TEST-*.xml; do
            [ -f "$xml" ] || continue

            t=$(grep -oP 'tests="\K[0-9]+' "$xml" | head -1 || echo 0)
            f=$(grep -oP 'failures="\K[0-9]+' "$xml" | head -1 || echo 0)
            e=$(grep -oP 'errors="\K[0-9]+' "$xml" | head -1 || echo 0)
            s=$(grep -oP 'skipped="\K[0-9]+' "$xml" | head -1 || echo 0)

            TOTAL=$((TOTAL + t))
            FAILED=$((FAILED + f + e))
            SKIPPED=$((SKIPPED + s))

            # Get failed test names
            if [ "$f" -gt 0 ] || [ "$e" -gt 0 ]; then
              FAILS=$(grep -oP 'classname="[^"]+"\s+name="[^"]+"' "$xml" | awk -F'name="' '{print $2}' | awk -F'"' '{print $1}')
              for test in $FAILS; do
                FAILED_TESTS="${FAILED_TESTS}${test}\n"
              done
            fi
          done

          PASSED=$((TOTAL - FAILED - SKIPPED))

          # Output totals and failed tests
          echo "tests_total=$TOTAL"     >> $GITHUB_OUTPUT
          echo "tests_passed=$PASSED"   >> $GITHUB_OUTPUT
          echo "tests_failed=$FAILED"   >> $GITHUB_OUTPUT
          echo "tests_skipped=$SKIPPED" >> $GITHUB_OUTPUT
          echo "failed_tests=$FAILED_TESTS" >> $GITHUB_OUTPUT

          # Set overall status
          if [ "$FAILED" -eq 0 ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

  # ── Allure Report ─────────────────────────────────────────
  generate-report:
    name: Generate Allure Report
    runs-on: ubuntu-latest
    needs: [ smoke-tests, regression-tests ]
    if: always()
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download smoke results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-smoke
          path: target/allure-results
        continue-on-error: true

      - name: Download regression results
        uses: actions/download-artifact@v4
        with:
          name: allure-results-regression
          path: target/allure-results
        continue-on-error: true

      - name: Generate Allure report (TLS FIXED)
        run: |
          curl -L --tlsv1.2 -o allure.tgz \
            https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -zxf allure.tgz
          ./allure-2.27.0/bin/allure generate target/allure-results --clean -o target/allure-report

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/allure-report

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: target/allure-report

  # ── Slack Notification ───────────────────────────────────
  notify-slack:
    needs: parse-results
    if: always()
    uses: ./.github/workflows/slack-notification.yml
    secrets: inherit
    with:
      status: ${{ needs.parse-results.outputs.status }}
      tests_total: ${{ needs.parse-results.outputs.tests_total }}
      tests_passed: ${{ needs.parse-results.outputs.tests_passed }}
      tests_failed: ${{ needs.parse-results.outputs.tests_failed }}
      tests_skipped: ${{ needs.parse-results.outputs.tests_skipped }}
      passed_tests: '' # Optional, you could populate later
      failed_tests: ${{ needs.parse-results.outputs.failed_tests }}

  # ── Email Notification ───────────────────────────────────
  notify-email:
    needs: parse-results
    if: always()
    uses: ./.github/workflows/email-notification.yml
    secrets: inherit
    with:
      status:        ${{ needs.parse-results.result }}
      tests_total:   ${{ needs.parse-results.outputs.tests_total }}
      tests_passed:  ${{ needs.parse-results.outputs.tests_passed }}
      tests_failed:  ${{ needs.parse-results.outputs.tests_failed }}
      tests_skipped: ${{ needs.parse-results.outputs.tests_skipped }}
      passed_tests:  ''
      failed_tests:  ''